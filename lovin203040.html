<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Lovin Ovin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body id="adminPanel" style="display:none; background:#f0f0f0; direction: rtl; font-family: sans-serif;">
    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

    <div style="background:orange; padding:20px; color:white; text-align:center; position:relative;">
        <button onclick="openReports()" style="position:absolute; right:10px; top:20px; background:white; color:orange; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer;">📊 الحسابات</button>
        <h2 style="margin:0;">لوحة إدارة LOVIN OVIN 👑</h2>
    </div>

    <div class="menu-container" style="padding:20px;">
        <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px;">
            <h3>➕ إضافة وجبة جديدة</h3>
            <input type="text" id="foodName" placeholder="اسم الوجبة" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
            <input type="number" id="foodPrice" placeholder="السعر" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px;">
            <input type="file" id="foodImg" style="margin:10px 0;">
            <button onclick="addNewItem()" style="width:100%; padding:15px; background:orange; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">نشر المنتج في المنيو</button>
        </div>

        <h3>🛎️ الطلبات الجديدة (تلقائي)</h3>
        <div id="liveOrders"></div>

        <hr>
        <h3 style="color:red;">⚠️ شكاوي العملاء</h3>
        <div id="complaintsBox" style="background:#fff0f0; padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid #ffcccc;">
            <div id="complaintsList"></div>
        </div>

        <hr>
        <h3>🛠️ إدارة المنيو (حذف وتعديل)</h3>
        <div id="menuEditor" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
    </div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDOLe6hXjYGLy-dJZgVWBsyKnG2nCdxqBQ",
        authDomain: "lovinovin-49635.firebaseapp.com",
        databaseURL: "https://lovinovin-49635-default-rtdb.firebaseio.com",
        projectId: "lovinovin-49635",
        storageBucket: "lovinovin-49635.firebasestorage.app",
        appId: "1:447380760213:web:07a8e676d5d0e606941d9c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // نظام الباسورد 1234
    if (sessionStorage.getItem('isLogged') !== 'true') {
        let p = prompt("برجاء إدخال كلمة سر الإدارة:");
        if (p === "1234") {
            sessionStorage.setItem('isLogged', 'true');
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("غير مسموح لك بالدخول!");
            window.location.href = "index.html";
        }
    } else {
        document.getElementById('adminPanel').style.display = 'block';
    }

    window.onclick = () => { document.getElementById('alertSound').pause(); };

    // مصفوفات البيانات لجلبها من السيرفر
    let currentOrders = {};
    let currentMenu = {};

    // استماع تلقائي للطلبات
    db.ref('orders').on('value', (snapshot) => {
        const orders = snapshot.val() || {};
        currentOrders = orders;
        const keys = Object.keys(orders);
        
        if(keys.length > (window.lastCount || 0)) {
            document.getElementById('alertSound').play().catch(()=>{});
            window.lastCount = keys.length;
        }

        const list = keys.reverse().map(id => {
            const o = orders[id];
            let statusColor = "#ccc"; 
            if(o.status === 'preparing') statusColor = "#3498db";
            if(o.status === 'onway') statusColor = "#f1c40f";
            if(o.status === 'delivered') statusColor = "#2ecc71";
            if(o.status === 'rejected') statusColor = "#e74c3c";

            return `
            <div style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; border-right: 8px solid ${statusColor};">
                <h4 style="margin:0;">👤 ${o.name} <small>(${o.time})</small></h4>
                <p style="margin:5px 0;">📦 ${o.items}</p>
                <p style="margin:0; font-weight:bold; color:orange;">💰 ${o.total} | 🛵 ${o.method}</p>
                ${o.payImg ? `<img src="${o.payImg}" style="width:80px; margin-top:5px; border-radius:5px; cursor:pointer;" onclick="window.open(this.src)">` : ''}
                
                <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button onclick="updateStatus('${id}', 'preparing')" style="background:#3498db; color:white; border:none; padding:8px; border-radius:5px; font-size:11px; cursor:pointer;">تحضير 👨‍🍳</button>
                    <button onclick="updateStatus('${id}', 'onway')" style="background:#f1c40f; color:white; border:none; padding:8px; border-radius:5px; font-size:11px; cursor:pointer;">في الطريق 🛵</button>
                    <button onclick="updateStatus('${id}', 'delivered')" style="background:#2ecc71; color:white; border:none; padding:8px; border-radius:5px; font-size:11px; cursor:pointer;">تم التسليم ✅</button>
                    <button onclick="updateStatus('${id}', 'rejected')" style="background:#e74c3c; color:white; border:none; padding:8px; border-radius:5px; font-size:11px; cursor:pointer;">رفض ❌</button>
                </div>
                <button onclick="clearOrder('${id}')" style="width:100%; margin-top:8px; background:#f4f4f4; border:none; padding:5px; border-radius:5px; color:gray; font-size:10px; cursor:pointer;">حذف من اللوحة</button>
            </div>`;
        }).join('');
        document.getElementById('liveOrders').innerHTML = list;
    });

    // استماع تلقائي للمنيو
    db.ref('menu').on('value', (snapshot) => {
        const menu = snapshot.val() || {};
        currentMenu = menu;
        document.getElementById('menuEditor').innerHTML = Object.keys(menu).map(id => `
            <div style="background:white; padding:10px; border-radius:10px; text-align:center;">
                <img src="${menu[id].img}" style="width:50px; height:50px; object-fit:cover;">
                <p style="font-size:12px; margin:5px 0;">${menu[id].name}</p>
                <button onclick="deleteItem('${id}')" style="background:red; color:white; border:none; font-size:10px; padding:5px; border-radius:5px; cursor:pointer;">حذف 🗑️</button>
            </div>
        `).join('');
    });

    // استماع تلقائي للشكاوى
    db.ref('complaints').on('value', (snapshot) => {
        const complaints = snapshot.val() || {};
        const compDiv = document.getElementById('complaintsList');
        const keys = Object.keys(complaints);
        if(keys.length === 0) {
            compDiv.innerHTML = "<p style='color:gray; text-align:center;'>لا توجد شكاوي حالياً</p>";
        } else {
            compDiv.innerHTML = keys.reverse().map(id => `
                <div style="background:white; padding:10px; border-radius:8px; margin-bottom:10px; border-right:4px solid red;">
                    <b>👤 ${complaints[id].name} (${complaints[id].phone || 'بدون رقم'})</b>
                    <p style="margin:5px 0; font-size:13px;">💬 ${complaints[id].text}</p>
                    <button onclick="deleteComp('${id}')" style="background:none; border:none; color:red; font-size:11px; text-decoration:underline; cursor:pointer;">حذف الشكوى</button>
                </div>
            `).join('');
        }
    });

    function updateStatus(id, s) {
        db.ref('orders/' + id).update({ status: s });
    }

    function addNewItem() {
        const file = document.getElementById('foodImg').files[0];
        if(!file) return alert("اختار صورة يا حسين!");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            db.ref('menu').push({ 
                name: document.getElementById('foodName').value, 
                price: document.getElementById('foodPrice').value, 
                img: e.target.result 
            }).then(() => {
                alert("تم النشر تلقائياً!");
                document.getElementById('foodName').value = "";
                document.getElementById('foodPrice').value = "";
            });
        };
        reader.readAsDataURL(file);
    }

    function deleteItem(id) {
        if(confirm("حذف المنتج؟")) db.ref('menu/' + id).remove();
    }

    function clearOrder(id) {
        if(confirm("حذف الطلب نهائياً؟")) db.ref('orders/' + id).remove();
    }

    function deleteComp(id) {
        if(confirm("حذف الشكوى؟")) db.ref('complaints/' + id).remove();
    }

    function openReports() {
        if(prompt("باسورد الحسابات:") === "a2020") {
            const delivered = Object.values(currentOrders).filter(x => x.status === 'delivered');
            const total = delivered.reduce((a, b) => a + parseFloat(b.total), 0);
            
            let detailsHTML = `
                <div id="reportOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; padding:20px; overflow-y:auto; direction:rtl; font-family:sans-serif;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2 style="color:orange; margin:0;">📊 تقرير مبيعات الشفت</h2>
                        <button onclick="document.getElementById('reportOverlay').remove()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">إغلاق X</button>
                    </div>
                    <div style="background:#f0fff0; padding:15px; border-radius:10px; border:1px solid #90ee90; margin-bottom:15px;">
                        <p style="margin:0; font-size:20px;">إجمالي الدخل: <b style="color:green;">${total} ج.م</b></p>
                        <p style="margin:5px 0 0 0;">عدد الطلبات المسلمة: <b>${delivered.length}</b></p>
                    </div>
                    <table style="width:100%; border-collapse: collapse; font-size:12px; text-align:right;">
                        <thead>
                            <tr style="background:#eee; border-bottom:2px solid orange;">
                                <th style="padding:10px; border:1px solid #ddd;">الوقت</th>
                                <th style="padding:10px; border:1px solid #ddd;">العميل</th>
                                <th style="padding:10px; border:1px solid #ddd;">الطلب</th>
                                <th style="padding:10px; border:1px solid #ddd;">المبلغ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${delivered.map(d => `
                                <tr>
                                    <td style="padding:8px; border:1px solid #ddd;">${d.time || '--'}</td>
                                    <td style="padding:8px; border:1px solid #ddd;">${d.name}</td>
                                    <td style="padding:8px; border:1px solid #ddd;">${d.items}</td>
                                    <td style="padding:8px; border:1px solid #ddd; font-weight:bold;">${d.total}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top:20px; text-align:center;">
                        <button onclick="if(confirm('تصفير الشفت؟ سيتم حذف جميع الطلبات من السيرفر!')){ db.ref('orders').remove(); location.reload(); }" style="color:red; background:none; border:1px solid red; padding:10px; border-radius:5px; cursor:pointer;">🗑️ تصفير الحسابات</button>
                    </div>
                </div>`;
            document.body.insertAdjacentHTML('beforeend', detailsHTML);
        } else { alert("الباسورد خطأ!"); }
    }
</script>
</body>
</html>
