<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovin Ovin | لوڤن أوڤن</title>
    <link rel="icon" href="logo.png" type="image/png"> 
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* تحسينات السلة الجديدة */
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        /* أنيميشن التحميل */
        .status-screen {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:white; z-index:3000; flex-direction:column; align-items:center; justify-content:center; text-align:center;
        }
        .loader {
            border: 8px solid #f3f3f3; border-top: 8px solid var(--primary);
            border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="statusScreen" class="status-screen">
    <img src="logo.png" style="width:100px; margin-bottom:20px;">
    <div class="loader"></div>
    <h2 id="statusTitle" style="color:var(--primary); margin-top:20px;">تم استلام طلبك!</h2>
    <p id="orderStatusText">جاري مراجعة طلبك وتحضيره الآن...</p>
    <p style="font-size:12px; color:#888;">برجاء عدم غلق هذه الصفحة لمتابعة التحديثات</p>
    <button onclick="cancelTracking()" style="margin-top:30px; border:none; background:none; color:red; text-decoration:underline;">إلغاء والعودة للقائمة</button>
</div>

<div class="header-pro">
    <img src="logo.png" style="width:60px; display:block; margin:0 auto 10px;"> <h1 style="color:var(--primary); margin:0;">LOVIN OVIN</h1>
    <p style="color:#888; font-size:12px;">أسرع دليفري وأجمد طعم وكافيه</p>
</div>

<div id="itemsGrid"></div>

<div class="cart-floating" id="cartBar" style="display:none; justify-content: space-between; align-items: center;" onclick="openOrder()">
    <span>إتمام الطلب 🛒 (<b id="cartCount">0</b>)</span>
    <b id="displayTotal">0 ج.م</b>
</div>

<div id="paymentModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; padding:20px; overflow-y:auto; box-sizing:border-box;">
    <h3>سلة المشتريات 🛒</h3>
    <div id="orderItems" style="background:#f9f9f9; border-radius:15px; padding:10px; margin-bottom:15px;"></div>
    
    <div style="margin-top:15px;">
        <input type="text" id="custName" placeholder="الاسم الكامل" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        
        <select id="delMethod" onchange="calcTotal()" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
            <option value="تيك أواي">تيك أواي (من الفرع)</option>
            <option value="دليفري">دليفري (+ 20 ج.م خدمة)</option>
        </select>

        <div id="delDetails" style="display:none;">
            <input type="number" id="custPhone" placeholder="رقم الموبايل" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" id="custAddr" placeholder="العنوان بالتفصيل" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        </div>

        <select id="payMethod" onchange="togglePayImg()" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
            <option value="عند الاستلام">كاش عند الاستلام</option>
            <option value="فودافون كاش">فودافون كاش / InstaPay</option>
        </select>

        <div id="payInstruction" style="display:none; background:#fff3e0; padding:10px; border-radius:8px; border:1px solid #ffe0b2; margin-bottom:10px;">
            <p style="font-size:12px; margin:0;">حول المبلغ على رقم: <b>01028047470</b></p>
            <p style="font-size:11px; color:#e67e22;">ارفع صورة التحويل هنا 👇</p>
            <input type="file" id="payImg" accept="image/*">
        </div>
    </div>

    <h2 style="text-align:center;">الإجمالي النهائي: <span id="finalPrice" style="color:var(--primary);">0</span> ج.م</h2>
    <button onclick="finish()" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; font-size:1.1rem;">إرسال الطلب للمطعم 🚀</button>
    <center><button onclick="document.getElementById('paymentModal').style.display='none'" style="margin-top:15px; color:gray; border:none; background:none; font-size:16px;">+ إضافة المزيد للمنبو</button></center>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDOLe6hXjYGLy-dJZgVWBsyKnG2nCdxqBQ",
        authDomain: "lovinovin-49635.firebaseapp.com",
        databaseURL: "https://lovinovin-49635-default-rtdb.firebaseio.com",
        projectId: "lovinovin-49635",
        storageBucket: "lovinovin-49635.firebasestorage.app",
        appId: "1:447380760213:web:07a8e676d5d0e606941d9c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];
    let menu = [];

    window.onload = function() {
        const pendingId = localStorage.getItem('pendingOrderId');
        if(pendingId) {
            document.getElementById('statusScreen').style.display = 'flex';
            watchOrderStatus(pendingId);
        }
        
        db.ref('menu').on('value', (snapshot) => {
            const data = snapshot.val();
            menu = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            render();
        });
    };

    function render() {
        document.getElementById('itemsGrid').innerHTML = menu.map((it, i) => `
            <div class="menu-card">
                <div class="img-container"><img src="${it.img}"></div>
                <div class="item-info">
                    <h3>${it.name}</h3>
                    <span class="price">${it.price} ج.م</span>
                </div>
                <button class="add-btn" onclick="addToCart(${i})">+</button>
            </div>
        `).join('');
    }

    function addToCart(i) {
        cart.push(menu[i]);
        document.getElementById('cartBar').style.display = 'flex';
        calcTotal();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        if(cart.length === 0) {
            document.getElementById('paymentModal').style.display = 'none';
            document.getElementById('cartBar').style.display = 'none';
        }
        openOrder(); // تحديث العرض داخل السلة
        calcTotal();
    }

    function calcTotal() {
        let base = cart.reduce((s, it) => s + parseFloat(it.price), 0);
        let delivery = document.getElementById('delMethod').value === 'دليفري' ? 20 : 0;
        let total = base + delivery;
        document.getElementById('displayTotal').innerText = total + " ج.م";
        document.getElementById('finalPrice').innerText = total;
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('delDetails').style.display = delivery > 0 ? 'block' : 'none';
    }

    function togglePayImg() {
        const isOnline = document.getElementById('payMethod').value === 'فودافون كاش';
        document.getElementById('payInstruction').style.display = isOnline ? 'block' : 'none';
    }

    function openOrder() {
        document.getElementById('paymentModal').style.display = 'block';
        document.getElementById('orderItems').innerHTML = cart.map((it, idx) => `
            <div class="cart-item-row">
                <span>${it.name} (${it.price} ج.م)</span>
                <button class="remove-btn" onclick="removeFromCart(${idx})">حذف 🗑️</button>
            </div>
        `).join('');
    }

    function finish() {
        const name = document.getElementById('custName').value;
        const method = document.getElementById('delMethod').value;
        const phone = document.getElementById('custPhone').value;
        const payType = document.getElementById('payMethod').value;
        const payImgFile = document.getElementById('payImg').files[0];

        if(!name) return alert("الاسم مطلوب!");
        if(method === 'دليفري' && !phone) return alert("رقم التلفون مهم للدليفري!");
        if(cart.length === 0) return alert("السلة فاضية!");

        const saveOrder = (imgBase64 = null) => {
            const newOrderRef = db.ref('orders').push();
            const orderId = newOrderRef.key;
            
            const order = {
                id: orderId,
                name, method, phone, payType, payImg: imgBase64,
                items: cart.map(i => i.name).join(' + '),
                total: document.getElementById('finalPrice').innerText,
                time: new Date().toLocaleTimeString('ar-EG'),
                status: 'new'
            };
            
            newOrderRef.set(order).then(() => {
                localStorage.setItem('pendingOrderId', orderId);
                cart = []; // تصفير السلة
                document.getElementById('paymentModal').style.display = 'none';
                document.getElementById('cartBar').style.display = 'none';
                document.getElementById('statusScreen').style.display = 'flex';
                watchOrderStatus(orderId);
            });
        }

        if(payImgFile) {
            const r = new FileReader();
            r.onload = (e) => saveOrder(e.target.result);
            r.readAsDataURL(payImgFile);
        } else {
            saveOrder();
        }
    }

    function watchOrderStatus(id) {
        db.ref('orders/' + id + '/status').on('value', (snapshot) => {
            const status = snapshot.val();
            const text = document.getElementById('orderStatusText');
            const title = document.getElementById('statusTitle');
            
            const statuses = {
                'new': "🕒 طلبك وصل للمطعم.. هنراجعه حالاً",
                'preparing': "👨‍🍳 جاري التحضير الآن في المطبخ..",
                'onway': "🛵 طلبك في الطريق إليك الآن.. استعد!",
                'delivered': "✅ تم التسليم بنجاح.. بالهنا والشفا!",
                'rejected': "❌ نعتذر، تم رفض الطلب لعدم توفر المكونات"
            };

            if (status && statuses[status]) {
                text.innerHTML = statuses[status];
                
                // لو الحالة "في الطريق"، بنطلع من صفحة التتبع ونروح للمنيو بعد 5 ثواني
                if (status === 'onway') {
                    title.innerHTML = "الأوردر خرج!";
                    text.style.color = "orange";
                    setTimeout(() => {
                        alert("طلبك في الطريق! تقدر تطلب حاجة تانية دلوقتي.");
                        cancelTracking();
                    }, 5000); 
                }
                
                if (status === 'delivered') {
                    title.innerHTML = "بالهنا والشفا!";
                    setTimeout(cancelTracking, 3000);
                }
            }
        });
    }

    function cancelTracking() {
        localStorage.removeItem('pendingOrderId');
        location.reload();
    }
</script>

<div onclick="toggleComp()" id="floatingCompBtn" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: red; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 9999; border: 3px solid white;">💬</div>
<div id="newCompScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
    <div style="background:white; width:85%; max-width:380px; padding:25px; border-radius:25px; direction:rtl;">
        <h3 style="text-align:center; color:red;">تقديم شكوى أو اقتراح ⚠️</h3>
        <input type="text" id="c_Name" placeholder="الاسم (اختياري)" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        <input type="number" id="c_Phone" placeholder="رقم الموبايل" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px;">
        <textarea id="c_Text" placeholder="اكتب مشكلتك هنا..." style="width:100%; height:100px; padding:12px; border:1px solid #ddd; border-radius:10px;"></textarea>
        <button onclick="sendMyComplaint()" style="width:100%; padding:15px; background:red; color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">إرسال الشكوى 🚀</button>
        <button onclick="toggleComp()" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script>
function toggleComp() {
    const screen = document.getElementById('newCompScreen');
    screen.style.display = (screen.style.display === 'none' || screen.style.display === '') ? 'flex' : 'none';
}
function sendMyComplaint() {
    const n = document.getElementById('c_Name').value;
    const p = document.getElementById('c_Phone').value;
    const t = document.getElementById('c_Text').value;
    if(!p || !t) return alert("يا ريت تكتب رقمك والشكوى!");
    db.ref('complaints').push({ name: n || "عميل مجهول", phone: p, text: t, time: new Date().toLocaleString('ar-EG') }).then(() => {
        alert("تم الإرسال بنجاح!");
        toggleComp();
    });
}
</script>
</body>
</html>
